  <head>
    <meta charset="UTF-8" />

    <title>Natalia Potocka | Doula i Terapeutka Traumy</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              nude: '#FDFCF8',       // Base background (Skin tone)
              blush: '#FCE4EC',      // Soft Pink
              mauve: '#5D4058',      // Deep Purple/Brown text
              gold: '#D4AF37',       // Gold accent
              goldLight: '#F3E5AB',  // Light gold for backgrounds
              rose: '#E6B8B8',       // Darker pink for shapes
            },
            fontFamily: {
              sans: ['Lato', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'morph': 'morph 8s ease-in-out infinite',
              'breathe': 'breathe 6s ease-in-out infinite',
              'heartbeat': 'heartbeat 3s ease-in-out infinite',
              'flow': 'flow 3s linear infinite',
              'flow-slow': 'flow 6s linear infinite',
              'flow-slower': 'flow 12s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              morph: {
                '0%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' },
                '50%': { borderRadius: '30% 60% 70% 40% / 50% 60% 30% 60%' },
                '100%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' },
              },
              breathe: {
                '0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(0,0,0,0)' },
                '50%': { transform: 'scale(1.02)', boxShadow: '0 10px 30px -10px rgba(93, 64, 88, 0.1)' },
              },
              heartbeat: {
                '0%': { transform: 'scale(1)' },
                '14%': { transform: 'scale(1.05)' },
                '28%': { transform: 'scale(1)' },
                '42%': { transform: 'scale(1.05)' },
                '70%': { transform: 'scale(1)' },
              },
              flow: {
                '0%': { strokeDashoffset: '1000' },
                '100%': { strokeDashoffset: '0' },
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{

}
</script>
