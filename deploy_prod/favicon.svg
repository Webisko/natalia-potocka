<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>Favicon Natalia Potocka</title>
  <desc>Monogram NP w kolorach marki Natalia Potocka: mauve, złoto i delikatny blush.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="36" y1="24" x2="220" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6B4A65"/>
      <stop offset="1" stop-color="#4F354C"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="0" cy="0" r="1" gradientTransform="translate(188 66) rotate(123) scale(108 92)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFD9D1" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#EFD9D1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="62" y1="62" x2="198" y2="194" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4E2A1"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#2E1E2C" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="72" fill="url(#bgGradient)"/>
  <circle cx="190" cy="68" r="68" fill="url(#glowGradient)"/>

  <g filter="url(#softShadow)" fill="none" stroke="url(#goldStroke)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M68 186V70" stroke-width="18"/>
    <path d="M68 70L128 164" stroke-width="18"/>
    <path d="M128 164V70" stroke-width="18"/>

    <path d="M146 186V70" stroke-width="18"/>
    <path d="M146 70H169C191.091 70 209 87.909 209 110C209 132.091 191.091 150 169 150H146" stroke-width="18"/>
  </g>

  <circle cx="188" cy="74" r="7" fill="#E88D67"/>
</svg>
